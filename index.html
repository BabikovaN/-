<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Навчання PRO+</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#74b9ff,#a29bfe);
  text-align:center;
}

h1{color:white}

.container{max-width:800px;margin:auto;padding:10px;}

.card{
  background:white;
  padding:20px;
  margin:15px;
  border-radius:15px;
}

textarea{
  width:95%;
  max-width:600px;
  padding:10px;
  font-family: monospace;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#4da3ff;
  color:white;
}

.correct{border:3px solid green;}
.wrong{border:3px solid red;}

.hidden{display:none;}

.level-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.level-btn{
  padding:15px;
  border-radius:10px;
  background:#dfe6e9;
  cursor:pointer;
}

.level-btn.locked{background:#b2bec3;}
.level-btn.open{background:#55efc4;}

.info-box{
  background:#f1f2f6;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  text-align:left;
}
</style>
</head>

<body>

<h1>🎮 HTML Навчання PRO+</h1>

<div class="container">

<div class="card">
  <button onclick="showTab('game')">🎯 Гра</button>
  <button onclick="showTab('levels')">📋 Рівні</button>
  <button onclick="showTab('profile')">👤 Профіль</button>
</div>

<!-- GAME -->
<div id="game" class="card">

  <h2 id="lessonTitle"></h2>

  <div id="instruction" class="info-box"></div>
  <div id="hint" class="info-box"></div>
  <div id="explanation" class="info-box"></div>
  <div id="example" class="info-box"></div>

  <textarea id="code"></textarea>

  <br>
  <button onclick="check()">Перевірити</button>

  <p id="msg"></p>
  <div id="preview"></div>

</div>

<!-- LEVELS -->
<div id="levels" class="card hidden">
  <h2>📋 Рівні</h2>
  <div id="levelsGrid" class="level-grid"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="card hidden">
  <h2>👤 Профіль</h2>
  XP: <span id="xp"></span><br>
  Рівень: <span id="levelUser"></span><br>
  Streak: <span id="streak"></span>
</div>

</div>

<script>

const successSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const errorSound = new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");

let user = JSON.parse(localStorage.getItem("user")) || {
  xp:0,
  level:1,
  streak:0,
  unlocked:1
};

let currentLevel = 0;

constconst tasks = [
{
t:"Заголовок",
instruction:"Створи заголовок за допомогою тегу h1",
hint:"Використай <h1>",
exp:"<h1> використовується для головного заголовка",
example:"<h1>Мій сайт</h1>",
v:(c)=>c.includes("<h1>")
},
{
t:"Абзац",
instruction:"Створи абзац тексту",
hint:"Використай <p>",
exp:"<p> використовується для тексту",
example:"<p>Привіт</p>",
v:(c)=>c.includes("<p>")
},
{
t:"Жирний",
instruction:"Зроби текст жирним",
hint:"Тег <b>",
exp:"Жирний текст",
example:"<b>Текст</b>",
v:(c)=>c.includes("<b>")
},
{
t:"Курсив",
instruction:"Зроби текст курсивом",
hint:"Тег <i>",
exp:"Курсив",
example:"<i>Текст</i>",
v:(c)=>c.includes("<i>")
},
{
t:"Посилання",
instruction:"Створи посилання",
hint:"<a href>",
exp:"Посилання",
example:'<a href="#">Сайт</a>',
v:(c)=>c.includes("<a")
},

// ➕ ДОДАНІ РІВНІ

{
t:"Зображення",
instruction:"Додай зображення на сторінку",
hint:"Тег <img src>",
exp:"<img> використовується для картинок",
example:'<img src="image.jpg">',
v:(c)=>c.includes("<img")
},
{
t:"Список",
instruction:"Створи список",
hint:"<ul> і <li>",
exp:"Списки використовуються для переліків",
example:"<ul><li>1</li><li>2</li></ul>",
v:(c)=>c.includes("<ul>")
},
{
t:"Нумерований список",
instruction:"Створи нумерований список",
hint:"<ol> і <li>",
exp:"Нумерований список має цифри",
example:"<ol><li>1</li><li>2</li></ol>",
v:(c)=>c.includes("<ol>")
},
{
t:"Контейнер",
instruction:"Створи блок div",
hint:"Тег <div>",
exp:"div використовується для структури",
example:"<div>Контент</div>",
v:(c)=>c.includes("<div")
},
{
t:"Кнопка",
instruction:"Створи кнопку",
hint:"Тег <button>",
exp:"Кнопки використовуються для дій",
example:"<button>Натисни</button>",
v:(c)=>c.includes("<button")
},
{
t:"Форма",
instruction:"Створи форму",
hint:"Тег <form>",
exp:"Форми використовуються для введення даних",
example:"<form></form>",
v:(c)=>c.includes("<form")
}
];
  

function showTab(tab){
  document.getElementById("game").classList.add("hidden");
  document.getElementById("levels").classList.add("hidden");
  document.getElementById("profile").classList.add("hidden");
  document.getElementById(tab).classList.remove("hidden");
}

function loadLevel(i){

  if(i > user.unlocked){
    alert("🔒 Заблоковано");
    return;
  }

  currentLevel = i;
  showTab('game');

  let t = tasks[i];

  document.getElementById("lessonTitle").innerText = t.t;
  document.getElementById("instruction").innerHTML = "📌 Завдання: " + t.instruction;
  document.getElementById("hint").innerHTML = "💡 Підказка: " + t.hint;
  document.getElementById("explanation").innerHTML = "🧠 Пояснення: " + t.exp;
  document.getElementById("example").innerHTML = "🧾 Приклад: <pre>"+t.example+"</pre>";

  document.getElementById("code").value="";
}

function check(){

  let code = document.getElementById("code").value;
  let t = tasks[currentLevel];
  let preview = document.getElementById("preview");

  preview.classList.remove("correct","wrong");

  if(!t.v(code)){
    document.getElementById("msg").innerText="❌ Помилка";
    preview.classList.add("wrong");
    errorSound.play();
    user.streak = 0;
    save();
    updateUI();
    return;
  }

  document.getElementById("msg").innerText="✅ Правильно!";
  preview.classList.add("correct");
  preview.innerHTML = code;

  successSound.play();

  user.xp += 20;
  user.streak++;

  if(user.xp >= 100){
    user.level++;
    user.xp = 0;
  }

  if(currentLevel >= user.unlocked){
    user.unlocked++;
  }

  save();
  updateUI();
  renderLevels();
}

function renderLevels(){
  let grid = document.getElementById("levelsGrid");
  grid.innerHTML="";

  tasks.forEach((t,i)=>{

    let btn = document.createElement("div");
    btn.className="level-btn";

    if(i < user.unlocked){
      btn.classList.add("open");
    } else {
      btn.classList.add("locked");
    }

    btn.innerText = t.t;
    btn.onclick = ()=>loadLevel(i);

    grid.appendChild(btn);
  });
}

function updateUI(){
  document.getElementById("xp").innerText = user.xp;
  document.getElementById("levelUser").innerText = user.level;
  document.getElementById("streak").innerText = user.streak;
}

function save(){
  localStorage.setItem("user",JSON.stringify(user));
}

renderLevels();
updateUI();
loadLevel(0);

</script>

</body>
</html>
