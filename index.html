<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Pet HTML Trainer 🐾</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#eef2f7;
}

.header {
  background:#1e1e2f;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container {
  display:flex;
  height:calc(100vh - 50px);
}

.panel {
  flex:1;
  padding:15px;
  overflow:auto;
}

.left {
  background:#1e1e2f;
  color:white;
}

.right {
  background:#fff;
  border-left:2px solid #ddd;
}

textarea {
  width:100%;
  height:250px;
  background:#111;
  color:#0f0;
  border:none;
  padding:10px;
  font-family:monospace;
}

button {
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}

#preview {
  border:1px solid #ccc;
  padding:10px;
  min-height:150px;
}

.progress {
  height:10px;
  background:#444;
  border-radius:5px;
  overflow:hidden;
  margin:10px 0;
}

.progress-bar {
  height:100%;
  width:0%;
  background:#4da3ff;
  transition:0.3s;
}

.badge {
  background:#4da3ff;
  padding:5px 10px;
  border-radius:8px;
}

#hintBox {
  display:none;
  background:#333;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

.success {
  animation: pop 0.4s ease;
}

@keyframes pop {
  0% { transform:scale(1); }
  50% { transform:scale(1.1); }
  100% { transform:scale(1); }
}
  @media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .panel {
    height:auto;
  }

  textarea {
    height:200px;
    font-size:16px;
  }

  button {
    width:100%;
    font-size:16px;
  }

  .header {
    flex-direction:column;
    gap:5px;
    text-align:center;
  }
}
</style>
</head>

<body>

<div class="header">
  <div>🐾 HTML Trainer</div>
  <div>
    XP: <span id="xp">0</span> |
    Streak: <span id="streak">0</span>
  </div>
</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="container">

  <div class="panel left">
    <h2 id="levelTitle"></h2>

    <p><b>📌 Завдання:</b> <span id="instruction"></span></p>

    <button onclick="toggleHint()">💡 Підказка</button>

    <div id="hintBox">
      <p id="hint"></p>
    </div>

    <p><b>🧪 Приклад:</b> <code id="example"></code></p>

    <textarea id="code"></textarea>

    <button onclick="check()">Перевірити</button>

    <p id="msg"></p>
  </div>

  <div class="panel right">
    <h3>👀 Preview</h3>
    <div id="preview"></div>

    <h3>🧾 Код</h3>
    <pre id="codeView"></pre>
  </div>

</div>

<audio id="successSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="failSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>

<script>

// ===== STATE =====
let user = JSON.parse(localStorage.getItem("user")) || {
 xp:0,
 streak:0,
 currentLevel:0
};

// ===== PARSER =====
function parseHTML(code){
  let parser = new DOMParser();
  return parser.parseFromString(code,"text/html").body;
}

// ===== TASKS =====
const tasks = [
{t:"🐾 Заголовок",instruction:"Створи <h1>",hint:"<h1>Кіт</h1>",example:"<h1>Кіт</h1>",check:(doc)=>{
 let el = doc.querySelector("h1");
 return {ok: el && el.textContent.trim(), errors: !el?["❌ Немає <h1>"]:[]}
}},
{t:"🐾 Абзац",instruction:"Створи <p>",hint:"<p>",example:"<p>Текст</p>",check:(doc)=>{
 let el = doc.querySelector("p");
 return {ok: el, errors: !el?["❌ Немає <p>"]:[]}
}},
{t:"🐾 Жирний",instruction:"<b>",hint:"",example:"<b>Текст</b>",check:(doc)=>{
 return {ok: doc.querySelector("b"), errors: doc.querySelector("b")?[]:["❌ Немає <b>"]}
}},
{t:"🐾 Курсив",instruction:"<i>",hint:"",example:"<i>Текст</i>",check:(doc)=>{
 return {ok: doc.querySelector("i"), errors: doc.querySelector("i")?[]:["❌ Немає <i>"]}
}},
{t:"🐾 Посилання",instruction:"<a>",hint:"",example:'<a href="#">Link</a>',check:(doc)=>{
 let el = doc.querySelector("a");
 return {ok: el && el.hasAttribute("href"), errors: !el?["❌ Немає <a>"]:[]}
}},
{t:"🐾 Зображення",instruction:"<img>",hint:"",example:'<img src="cat.jpg">',check:(doc)=>{
 return {ok: doc.querySelector("img"), errors: doc.querySelector("img")?[]:["❌ Немає <img>"]}
}},
{t:"🐾 Список",instruction:"<ul>",hint:"",example:"<ul><li></li></ul>",check:(doc)=>{
 let el = doc.querySelector("ul");
 return {ok: el && el.querySelector("li"), errors: !el?["❌ Немає <ul>"]:[]}
}},
{t:"🐾 OL список",instruction:"<ol>",hint:"",example:"<ol><li></li></ol>",check:(doc)=>{
 let el = doc.querySelector("ol");
 return {ok: el && el.querySelector("li"), errors: !el?["❌ Немає <ol>"]:[]}
}},
{t:"🐾 DIV",instruction:"<div>",hint:"",example:"<div></div>",check:(doc)=>{
 return {ok: doc.querySelector("div"), errors: doc.querySelector("div")?[]:["❌ Немає <div>"]}
}},
{t:"🐾 Button",instruction:"<button>",hint:"",example:"<button>OK</button>",check:(doc)=>{
 let el = doc.querySelector("button");
 return {ok: el && el.textContent.trim(), errors: !el?["❌ Немає <button>"]:[]}
}},
{t:"🐾 Form",instruction:"<form>",hint:"",example:"<form></form>",check:(doc)=>{
 return {ok: doc.querySelector("form"), errors: doc.querySelector("form")?[]:["❌ Немає <form>"]}
}}
];

// ===== UI =====
function updateUI(){
 document.getElementById("xp").innerText = user.xp;
 document.getElementById("streak").innerText = user.streak;

 let progress = (user.currentLevel / tasks.length)*100;
 document.getElementById("progressBar").style.width = progress + "%";
}

// ===== LEVEL =====
function loadLevel(i){
 user.currentLevel = i;
 localStorage.setItem("user", JSON.stringify(user));

 let t = tasks[i];
 document.getElementById("levelTitle").innerText = t.t;
 document.getElementById("instruction").innerText = t.instruction;
 document.getElementById("hint").innerText = t.hint;
 document.getElementById("example").innerText = t.example;

 let saved = localStorage.getItem("code_"+i) || "";
 document.getElementById("code").value = saved;

 updatePreview();
 updateUI();
}

// ===== PREVIEW =====
function updatePreview(){
 let code = document.getElementById("code").value;
 document.getElementById("codeView").innerText = code;
 document.getElementById("preview").innerHTML = code;
}

// ===== CHECK =====
function check(){
 let code = document.getElementById("code").value;
 let doc = parseHTML(code);
 let task = tasks[user.currentLevel];

 let result = task.check(doc);

 if(result.ok){
  document.getElementById("msg").innerText = "✅ Правильно!";
  document.getElementById("msg").classList.add("success");
  document.getElementById("successSound").play();

  user.xp += 20;
  user.streak += 1;

  localStorage.setItem("code_"+user.currentLevel, code);

  if(user.currentLevel < tasks.length-1){
   loadLevel(user.currentLevel+1);
  }

 } else {
  document.getElementById("msg").innerText = result.errors.join(" | ");
  document.getElementById("failSound").play();
 }

 localStorage.setItem("user", JSON.stringify(user));
 updateUI();
}

// ===== HINT =====
function toggleHint(){
 let box = document.getElementById("hintBox");
 box.style.display = box.style.display === "none" ? "block" : "none";
}

// ===== EVENTS =====
document.getElementById("code").addEventListener("input", updatePreview);

// ===== INIT =====
loadLevel(user.currentLevel || 0);

</script>

</body>
</html>
