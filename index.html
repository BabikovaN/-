<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Навчання PRO+</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#74b9ff,#a29bfe);
  text-align:center;
}

h1{color:white}

.nav button{
  margin:5px;
}

.container{max-width:800px;margin:auto;padding:10px;}

.card{
  background:white;
  padding:20px;
  margin:15px;
  border-radius:15px;
}

textarea{
  width:95%;
  max-width:600px;
  padding:10px;
  font-family: monospace;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#4da3ff;
  color:white;
}

.correct{border:3px solid green;}
.wrong{border:3px solid red;}

.hidden{display:none;}

.level-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.level-btn{
  padding:15px;
  border-radius:10px;
  background:#dfe6e9;
  cursor:pointer;
}

.level-btn.locked{
  background:#b2bec3;
  cursor:not-allowed;
}

.level-btn.open{
  background:#55efc4;
}

.badge{
  display:inline-block;
  padding:5px 10px;
  background:gold;
  margin:5px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🎮 HTML Навчання PRO+</h1>

<div class="nav">
  <button onclick="showTab('game')">🎯 Гра</button>
  <button onclick="showTab('levels')">📋 Рівні</button>
  <button onclick="showTab('profile')">👤 Профіль</button>
</div>

<div class="container">

<!-- GAME -->
<div id="game" class="card">

  <h2 id="lessonTitle"></h2>
  <div id="example"></div>

  <textarea id="code"></textarea>

  <br>
  <button onclick="check()">Перевірити</button>

  <p id="msg"></p>

  <div id="preview"></div>

</div>

<!-- LEVELS -->
<div id="levels" class="card hidden">
  <h2>📋 Вибір рівнів</h2>
  <div id="levelsGrid" class="level-grid"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="card hidden">
  <h2>👤 Профіль</h2>
  <p>XP: <span id="xp"></span></p>
  <p>Рівень: <span id="levelUser"></span></p>
  <p>Streak: <span id="streak"></span></p>

  <h3>🏅 Бейджі:</h3>
  <div id="badges"></div>
</div>

</div>

<script>

const successSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const errorSound = new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");

let user = JSON.parse(localStorage.getItem("user")) || {
  xp:0,
  level:1,
  streak:0,
  unlocked:1
};

let currentLevel = 0;

const tasks = [
{t:"Заголовок",e:"<h1>Text</h1>",v:(c)=>c.includes("<h1>")},
{t:"Абзац",e:"<p>Text</p>",v:(c)=>c.includes("<p>")},
{t:"Жирний",e:"<b>Text</b>",v:(c)=>c.includes("<b>")},
{t:"Курсив",e:"<i>Text</i>",v:(c)=>c.includes("<i>")},
{t:"Посилання",e:'<a href="#">Link</a>',v:(c)=>c.includes("<a")},
{t:"Зображення",e:'<img src="img.jpg">',v:(c)=>c.includes("<img")},
{t:"Список",e:"<ul><li>1</li></ul>",v:(c)=>c.includes("<ul>")},
{t:"Таблиця",e:"<table><tr><td>1</td></tr></table>",v:(c)=>c.includes("<table>")},
{t:"Кнопка",e:"<button>OK</button>",v:(c)=>c.includes("<button>")},
{t:"Div",e:"<div>Block</div>",v:(c)=>c.includes("<div>")},
{t:"Форма",e:"<form><input></form>",v:(c)=>c.includes("<form>")}
];

function showTab(tab){
  document.getElementById("game").classList.add("hidden");
  document.getElementById("levels").classList.add("hidden");
  document.getElementById("profile").classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");
}

function loadLevel(i){
  if(i > user.unlocked){
    alert("🔒 Рівень заблоковано");
    return;
  }

  currentLevel = i;
  showTab('game');

  let t = tasks[i];

  document.getElementById("lessonTitle").innerText = t.t;
  document.getElementById("example").innerHTML = "<pre>"+t.e+"</pre>";
  document.getElementById("code").value="";
  document.getElementById("msg").innerText="";
  document.getElementById("preview").innerHTML="";
}

function check(){

  let code = document.getElementById("code").value;
  let t = tasks[currentLevel];

  let preview = document.getElementById("preview");

  preview.classList.remove("correct","wrong");

  if(!t.v(code)){
    document.getElementById("msg").innerText="❌ Помилка";
    preview.classList.add("wrong");
    errorSound.play();
    user.streak = 0;
    save();
    return;
  }

  document.getElementById("msg").innerText="✅ Правильно!";
  preview.classList.add("correct");
  preview.innerHTML = code;

  successSound.play();

  user.xp += 20;
  user.streak++;

  if(user.xp >= 100){
    user.level++;
    user.xp = 0;
  }

  if(currentLevel >= user.unlocked){
    user.unlocked++;
  }

  save();
  updateUI();
  renderLevels();
}

function renderLevels(){
  let grid = document.getElementById("levelsGrid");
  grid.innerHTML="";

  tasks.forEach((t,i)=>{

    let btn = document.createElement("div");
    btn.className = "level-btn";

    if(i < user.unlocked){
      btn.classList.add("open");
    }else{
      btn.classList.add("locked");
    }

    btn.innerText = t.t;

    btn.onclick = ()=>loadLevel(i);

    grid.appendChild(btn);
  });
}

function updateUI(){
  document.getElementById("xp").innerText = user.xp;
  document.getElementById("levelUser").innerText = user.level;
  document.getElementById("streak").innerText = user.streak;

  let badges = document.getElementById("badges");
  badges.innerHTML="";

  if(user.level >= 2) badges.innerHTML += '<div class="badge">Новачок</div>';
  if(user.level >= 5) badges.innerHTML += '<div class="badge">Учень</div>';
  if(user.level >= 10) badges.innerHTML += '<div class="badge">Майстер</div>';
}

function save(){
  localStorage.setItem("user",JSON.stringify(user));
}

renderLevels();
updateUI();
loadLevel(0);

</script>

</body>
</html>
