<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Навчання PRO+</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#74b9ff,#a29bfe);
  text-align:center;
}

h1{color:white}

.container{max-width:900px;margin:auto;padding:10px;}

.card{
  background:white;
  padding:20px;
  margin:15px;
  border-radius:15px;
}

textarea{
  width:95%;
  max-width:600px;
  padding:10px;
  font-family: monospace;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#4da3ff;
  color:white;
}

.correct{border:3px solid green;}
.wrong{border:3px solid red;}

.hidden{display:none;}

.info-box{
  background:#f1f2f6;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  text-align:left;
}

#example{
  background:#fff;
  border-left:6px solid #00cec9;
  font-family: monospace;
}

#explanation{
  background:#ffeaa7;
  border-left:6px solid #e17055;
  font-weight:bold;
}

#codeView{
  background:#2d3436;
  color:#00ffcc;
  padding:10px;
  border-radius:10px;
  min-height:150px;
  text-align:left;
  overflow:auto;
}

#preview{
  background:#fff;
  padding:15px;
  border-radius:10px;
  min-height:150px;
  border:2px solid #ccc;
  text-align:left;
  color:#000;
}

#preview *{
  color:#000;
}
</style>
</head>

<body>

<h1>🎮 HTML Навчання PRO+</h1>

<div class="container">

<div class="card">
  <button onclick="showTab('game')">🎯 Гра</button>
  <button onclick="showTab('profile')">👤 Профіль</button>
</div>

<div id="game" class="card">

  <h2 id="lessonTitle"></h2>

  <div id="instruction" class="info-box"></div>
  <div id="hint" class="info-box"></div>
  <div id="explanation" class="info-box"></div>
  <div id="example" class="info-box"></div>

  <textarea id="code"></textarea>

  <br>
  <button onclick="check()">Перевірити</button>

  <p id="msg"></p>

  <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">

    <div style="flex:1; min-width:300px;">
      <h3>🧾 Код</h3>
      <pre id="codeView"></pre>
    </div>

    <div style="flex:1; min-width:300px;">
      <h3>👀 Результат</h3>
      <div id="preview"></div>
    </div>

  </div>

</div>

<div id="profile" class="card hidden">
  XP: <span id="xp"></span><br>
  Рівень: <span id="levelUser"></span>
</div>

</div>

<script>

let user = JSON.parse(localStorage.getItem("user")) || {
  xp:0,
  level:1
};

let savedCode = JSON.parse(localStorage.getItem("savedCode")) || {};

let currentLevel = 0;

function escapeHTML(str){
  return str.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

const tasks = [
{
t:"Заголовок",
instruction:"Напиши HTML код заголовка сторінки",
hint:"Використай <h1>",
exp:"Приклад: <h1>Мій сайт</h1>",
example:"<h1>Мій сайт</h1>",
v:(c)=>c.includes("<h1>")
},
{
t:"Абзац",
instruction:"Створи абзац тексту",
hint:"<p>",
exp:"Приклад: <p>Привіт</p>",
example:"<p>Привіт</p>",
v:(c)=>c.includes("<p>")
},
{
t:"Жирний текст",
instruction:"Зроби текст жирним",
hint:"<b>",
exp:"Приклад: <b>Текст</b>",
example:"<b>Текст</b>",
v:(c)=>c.includes("<b>")
},
{
t:"Курсив",
instruction:"Курсив текст",
hint:"<i>",
exp:"Приклад: <i>Текст</i>",
example:"<i>Текст</i>",
v:(c)=>c.includes("<i>")
},
{
t:"Посилання",
instruction:"Створи посилання",
hint:"<a>",
exp:"Приклад: <a href='#'>Сайт</a>",
example:'<a href="#">Сайт</a>',
v:(c)=>c.includes("<a")
},
{
t:"Зображення",
instruction:"Додай зображення",
hint:"<img>",
exp:"Приклад: <img src='img.jpg'>",
example:'<img src="img.jpg">',
v:(c)=>c.includes("<img")
},
{
t:"Список",
instruction:"Створи список",
hint:"<ul>",
exp:"Приклад: <ul><li>1</li></ul>",
example:"<ul><li>1</li></ul>",
v:(c)=>c.includes("<ul")
},
{
t:"Нумерований список",
instruction:"Нумерований список",
hint:"<ol>",
exp:"Приклад: <ol><li>1</li></ol>",
example:"<ol><li>1</li></ol>",
v:(c)=>c.includes("<ol")
},
{
t:"Контейнер",
instruction:"Створи блок",
hint:"<div>",
exp:"Приклад: <div>Текст</div>",
example:"<div>Текст</div>",
v:(c)=>c.includes("<div")
},
{
t:"Кнопка",
instruction:"Створи кнопку",
hint:"<button>",
exp:"Приклад: <button>OK</button>",
example:"<button>OK</button>",
v:(c)=>c.includes("<button")
},
{
t:"Форма",
instruction:"Створи форму",
hint:"<form>",
exp:"Приклад: <form></form>",
example:"<form></form>",
v:(c)=>c.includes("<form")
}
];

function showTab(tab){
  document.getElementById("game").classList.add("hidden");
  document.getElementById("profile").classList.add("hidden");
  document.getElementById(tab).classList.remove("hidden");
}

function loadLevel(i){
  currentLevel = i;
  showTab('game');

  let t = tasks[i];

  document.getElementById("lessonTitle").innerText = t.t;
  document.getElementById("instruction").innerHTML = t.instruction;
  document.getElementById("hint").innerHTML = t.hint;
  document.getElementById("explanation").innerHTML = t.exp;
  document.getElementById("example").innerHTML = "<pre>"+escapeHTML(t.example)+"</pre>";

  document.getElementById("code").value = savedCode[i] || "";

  document.getElementById("preview").innerHTML = "";
  document.getElementById("codeView").innerHTML = "";
  document.getElementById("msg").innerText = "";
}

function check(){

  let code = document.getElementById("code").value;
  let t = tasks[currentLevel];
  let preview = document.getElementById("preview");

  savedCode[currentLevel] = code;
  localStorage.setItem("savedCode", JSON.stringify(savedCode));

  if(!t.v(code)){
    document.getElementById("msg").innerText="❌ Помилка";
    preview.classList.add("wrong");
    return;
  }

  document.getElementById("msg").innerText="✅ Правильно!";
  preview.classList.remove("wrong");
  preview.classList.add("correct");

  document.getElementById("codeView").innerHTML = escapeHTML(code);
  preview.innerHTML = code;

  user.xp += 20;
  if(user.xp >= 100){
    user.level++;
    user.xp = 0;
  }

  localStorage.setItem("user",JSON.stringify(user));
  updateUI();

  if(currentLevel < tasks.length - 1){
    loadLevel(currentLevel + 1);
  }
}

function updateUI(){
  document.getElementById("xp").innerText = user.xp;
  document.getElementById("levelUser").innerText = user.level;
}

updateUI();
loadLevel(0);

</script>

</body>
</html>
