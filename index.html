<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="google-site-verification" content="googlea8970634e6f1a5cd">
<title>Pet HTML Trainer — навчання HTML дітям</title>

<meta name="description" content="Інтерактивна гра для дітей — вивчи HTML легко та цікаво. Створи свій сайт прямо в браузері!">

<meta name="keywords" content="HTML для дітей, навчання HTML, тренажер HTML, сайт для початківців">

<meta name="author" content="Анастасія Коцюбенко">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>
body {
  font-family: Arial;
  margin:0;
  background:#eef2f7;
}

.header {
  background:#1e1e2f;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.container {
  display:flex;
  height:calc(100vh - 60px);
}

.panel {
  flex:1;
  padding:15px;
  overflow:auto;
}

.left {
  background:#1e1e2f;
  color:white;
}

.right {
  background:white;
  border-left:2px solid #ddd;
}

textarea {
  width:100%;
  height:200px;
  background:#111;
  color:#0f0;
  border:none;
  padding:10px;
  font-family:monospace;
}

button {
  padding:10px;
  margin-top:10px;
  cursor:pointer;
  border:none;
  border-radius:8px;
  background:#4da3ff;
  color:white;
}

#preview {
  border:1px solid #ccc;
  padding:10px;
  min-height:120px;
  background:#fff;
}

pre {
  background:#111;
  color:#0f0;
  padding:10px;
  height:150px;
  overflow:auto;
}

iframe {
  width:100%;
  height:200px;
  border:none;
  background:#fff;
}

.progress {
  height:10px;
  background:#444;
}

.progress-bar {
  height:100%;
  width:0%;
  background:#4da3ff;
}

#hintBox {
  display:none;
  background:#dff6ff;
  padding:10px;
  border-radius:8px;
  color:black;
}
</style>
</head>

<body>

<div class="header">
  <div>🐾 HTML Trainer</div>
  <div>
    XP: <span id="xp">0</span> |
    Streak: <span id="streak">0</span>
  </div>
</div>
<a href="https://babikovan.github.io/-/">Сайт</a>
<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="panel left">
    <h2 id="levelTitle"></h2>

    <p id="instruction"></p>

    <button onclick="toggleHint()">💡 Підказка</button>

    <div id="hintBox">
      <p id="hint"></p>
    </div>

    <p><b>Приклад:</b></p>
    <code id="example"></code>

    <textarea id="code"></textarea>

    <button onclick="check()">Перевірити</button>
    <button onclick="restartGame()">🔄 Почати заново</button>

    <p id="msg"></p>
  </div>

  <!-- RIGHT -->
  <div class="panel right">
    <h3>👀 Preview</h3>
    <div id="preview"></div>

    <h3>🧾 Код</h3>
    <pre id="codeView"></pre>

    <h3>🌐 Мій сайт</h3>
    <iframe id="fullHistory"></iframe>
  </div>

</div>

<script>

// ===== STATE =====
let user = JSON.parse(localStorage.getItem("user")) || {
 xp:0,
 streak:0,
 currentLevel:0
};

// ===== PARSER =====
function parseHTML(code){
 let parser = new DOMParser();
 return parser.parseFromString(code,"text/html").body;
}

// ===== CODE VIEW =====
function updateCodeView(){
 let allCode = "";

 for(let i = 0; i <= user.currentLevel; i++){
  let saved = localStorage.getItem("code_"+i);
  if(saved){
   allCode += `--- Рівень ${i+1} ---\n${saved}\n\n`;
  }
 }

 let current = document.getElementById("code").value;
 allCode += "--- Поточний ---\n" + current;

 document.getElementById("codeView").innerText = allCode;
}

// ===== REAL SITE =====
function updateFullHistory(){
 let code = document.getElementById("code").value;
 document.getElementById("fullHistory").srcdoc = code;
}

// ===== PREVIEW =====
function updatePreview(){
 let code = document.getElementById("code").value;

 document.getElementById("preview").innerHTML = code;

 updateFullHistory();
 updateCodeView();
}

// ===== TASKS =====
const tasks = [
{t:"🐱 Рівень 1",instruction:"Заголовок",hint:"<h1>",example:"<h1>Кіт</h1>",check:(d)=>({ok:d.querySelector("h1")})},
{t:"🐶 Рівень 2",instruction:"Текст",hint:"<p>",example:"<p>Текст</p>",check:(d)=>({ok:d.querySelector("p")})},
{t:"🐱 Рівень 3",instruction:"Жирний",hint:"<b>",example:"<b>Кіт</b>",check:(d)=>({ok:d.querySelector("b")})},
{t:"🐶 Рівень 4",instruction:"Курсив",hint:"<i>",example:"<i>Кіт</i>",check:(d)=>({ok:d.querySelector("i")})},
{t:"🐱 Рівень 5",instruction:"Посилання",hint:"<a>",example:"<a href='#'>link</a>",check:(d)=>({ok:d.querySelector("a")})},
{t:"🐶 Рівень 6",instruction:"Картинка",hint:"<img>",example:"<img src='...'>",check:(d)=>({ok:d.querySelector("img")})},
{t:"🐱 Рівень 7",instruction:"Список",hint:"<ul>",example:"<ul><li>1</li><li>2</li><li>3</li></ul>",check:(d)=>({ok:d.querySelector("ul")})},
{t:"🐶 Рівень 8",instruction:"Нумерований",hint:"<ol>",example:"<ol><li>1</li><li>2</li><li>3</li></ol>",check:(d)=>({ok:d.querySelector("ol")})},
{t:"🐱 Рівень 9",instruction:"Блок",hint:"<div>",example:"<div></div>",check:(d)=>({ok:d.querySelector("div")})},
{t:"🐶 Рівень 10",instruction:"Кнопка",hint:"<button>",example:"<button>OK</button>",check:(d)=>({ok:d.querySelector("button")})},
{t:"🐱 Рівень 11",instruction:"Форма",hint:"<form>",example:"<form></form>",check:(d)=>({ok:d.querySelector("form")})},
{t:"🏆 Рівень 12",instruction:"Фінал",hint:"<h1>",example:"<h1>Я молодець</h1>",check:(d)=>({ok:d.querySelector("h1")})}
];

// ===== UI =====
function updateUI(){
 let progress = (user.currentLevel / tasks.length)*100;
 document.getElementById("progressBar").style.width = progress + "%";

 document.getElementById("xp").innerText = user.xp;
 document.getElementById("streak").innerText = user.streak;
}

// ===== LEVEL =====
function loadLevel(i){
 user.currentLevel = i;
 localStorage.setItem("user", JSON.stringify(user));

 let t = tasks[i];

 document.getElementById("levelTitle").innerText = t.t;
 document.getElementById("instruction").innerText = t.instruction;
 document.getElementById("hint").innerText = t.hint;
 document.getElementById("example").innerText = t.example;

 document.getElementById("code").value = localStorage.getItem("code_"+i) || "";

 updatePreview();
 updateUI();
}

// ===== CHECK =====
function check(){
 let code = document.getElementById("code").value;
 let doc = parseHTML(code);
 let task = tasks[user.currentLevel];

 let result = task.check(doc);

 if(result.ok){
  document.getElementById("msg").innerText = "✅ Правильно!";
  user.xp += 20;
  user.streak += 1;

  localStorage.setItem("code_"+user.currentLevel, code);

  if(user.currentLevel < tasks.length-1){
   loadLevel(user.currentLevel+1);
  }

 } else {
  document.getElementById("msg").innerText = "❌ Спробуй ще";
 }

 localStorage.setItem("user", JSON.stringify(user));
 updateUI();
}

// ===== HINT =====
function toggleHint(){
 let box = document.getElementById("hintBox");
 box.style.display = box.style.display === "none" ? "block" : "none";
}

// ===== RESTART =====
function restartGame(){
 if(!confirm("Почати заново?")) return;

 localStorage.clear();

 user = {xp:0,streak:0,currentLevel:0};

 document.getElementById("code").value = "";

 loadLevel(0);
 updateUI();
}

// ===== EVENTS =====
document.getElementById("code").addEventListener("input", updatePreview);

// ===== INIT =====
loadLevel(user.currentLevel || 0);

</script>

</body>
</html>
