<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Навчання PRO+</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#74b9ff,#a29bfe);
  text-align:center;
}

h1{color:white}

.container{max-width:800px;margin:auto;padding:10px;}

.card{
  background:white;
  padding:20px;
  margin:15px;
  border-radius:15px;
}

textarea{
  width:95%;
  max-width:600px;
  padding:10px;
  font-family: monospace;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#4da3ff;
  color:white;
}

.correct{border:3px solid green;}
.wrong{border:3px solid red;}

.hidden{display:none;}

.info-box{
  background:#f1f2f6;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  text-align:left;
  line-height:1.5;
}

#example{
  background:#ffffff;
  color:#000000;
  border-left: 6px solid #00cec9;
  font-family: monospace;
  font-weight: bold;
}

#explanation{
  background: linear-gradient(135deg,#ffeaa7,#fab1a0);
  border-left: 6px solid #e17055;
  font-weight:bold;
}

#codeView{
  background:#2d3436;
  color:#00ffcc;
  padding:10px;
  border-radius:10px;
  overflow-x:auto;
  min-height:150px;
  text-align:left;
}

#preview{
  background:#fff;
  padding:10px;
  border-radius:10px;
  min-height:150px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<h1>🎮 HTML Навчання PRO+</h1>

<div class="container">

<div class="card">
  <button onclick="showTab('game')">🎯 Гра</button>
  <button onclick="showTab('profile')">👤 Профіль</button>
</div>

<div id="game" class="card">

  <h2 id="lessonTitle"></h2>

  <div id="instruction" class="info-box"></div>
  <div id="hint" class="info-box"></div>
  <div id="explanation" class="info-box"></div>
  <div id="example" class="info-box"></div>

  <textarea id="code"></textarea>

  <br>
  <button onclick="check()">Перевірити</button>

  <p id="msg"></p>

  <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">

    <div style="flex:1; min-width:300px;">
      <h3>🧾 Код</h3>
      <pre id="codeView"></pre>
    </div>

    <div style="flex:1; min-width:300px;">
      <h3>👀 Результат</h3>
      <div id="preview"></div>
    </div>

  </div>

</div>

<div id="profile" class="card hidden">
  <h2>👤 Профіль</h2>
  XP: <span id="xp"></span><br>
  Рівень: <span id="levelUser"></span>
</div>

</div>

<script>

let user = JSON.parse(localStorage.getItem("user")) || {
  xp:0,
  level:1
};

let currentLevel = 0;

function escapeHTML(str){
  return str.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

const tasks = [
{
t:"Заголовок",
instruction:"Створи заголовок",
hint:"<h1>",
exp:"Головний заголовок",
example:"<h1>Мій сайт</h1>",
v:(c)=>c.includes("<h1>")
},
{
t:"Абзац",
instruction:"Створи абзац",
hint:"<p>",
exp:"Текст",
example:"<p>Привіт</p>",
v:(c)=>c.includes("<p>")
},
{
t:"Жирний текст",
instruction:"Жирний текст",
hint:"<b> або <strong>",
exp:"Bold",
example:"<b>Текст</b>",
v:(c)=>c.includes("<b>") || c.includes("<strong>")
},
{
t:"Курсив",
instruction:"Курсив",
hint:"<i> або <em>",
exp:"Italic",
example:"<i>Текст</i>",
v:(c)=>c.includes("<i>") || c.includes("<em>")
},
{
t:"Посилання",
instruction:"Створи посилання",
hint:"<a>",
exp:"Link",
example:'<a href="#">Сайт</a>',
v:(c)=>c.includes("<a")
},
{
t:"Зображення",
instruction:"Додай зображення",
hint:"<img>",
exp:"Image",
example:'<img src="img.jpg">',
v:(c)=>c.includes("<img")
},
{
t:"Список",
instruction:"Створи список",
hint:"<ul>",
exp:"List",
example:"<ul><li>1</li></ul>",
v:(c)=>c.includes("<ul>")
},
{
t:"Нумерований список",
instruction:"Нумерований список",
hint:"<ol>",
exp:"Ordered list",
example:"<ol><li>1</li></ol>",
v:(c)=>c.includes("<ol>")
},
{
t:"Контейнер",
instruction:"Блок",
hint:"<div>",
exp:"Container",
example:"<div>Контент</div>",
v:(c)=>c.includes("<div")
},
{
t:"Кнопка",
instruction:"Кнопка",
hint:"<button>",
exp:"Button",
example:"<button>OK</button>",
v:(c)=>c.includes("<button")
},
{
t:"Форма",
instruction:"Форма",
hint:"<form>",
exp:"Form",
example:"<form></form>",
v:(c)=>c.includes("<form")
}
];

function showTab(tab){
  document.getElementById("game").classList.add("hidden");
  document.getElementById("profile").classList.add("hidden");
  document.getElementById(tab).classList.remove("hidden");
}

function loadLevel(i){
  currentLevel = i;
  showTab('game');

  let t = tasks[i];

  document.getElementById("lessonTitle").innerText = t.t;
  document.getElementById("instruction").innerHTML = t.instruction;
  document.getElementById("hint").innerHTML = t.hint;
  document.getElementById("explanation").innerHTML = t.exp;
  document.getElementById("example").innerHTML = "<pre>" + escapeHTML(t.example) + "</pre>";

  document.getElementById("code").value="";
}

function check(){

  let code = document.getElementById("code").value;
  let t = tasks[currentLevel];
  let preview = document.getElementById("preview");

  if(!t.v(code)){
    document.getElementById("msg").innerText="❌ Помилка";
    preview.classList.add("wrong");
    return;
  }

  document.getElementById("msg").innerText="✅ Правильно!";
  preview.classList.remove("wrong");
  preview.classList.add("correct");

  document.getElementById("codeView").innerHTML = escapeHTML(code);
  preview.innerHTML = code;

  user.xp += 20;

  if(user.xp >= 100){
    user.level++;
    user.xp = 0;
  }

  localStorage.setItem("user",JSON.stringify(user));
  updateUI();

  // автоматично наступний рівень
  if(currentLevel < tasks.length - 1){
    loadLevel(currentLevel + 1);
  }
}

function updateUI(){
  document.getElementById("xp").innerText = user.xp;
  document.getElementById("levelUser").innerText = user.level;
}

updateUI();
loadLevel(0);

</script>

</body>
</html>
