<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Pet HTML Trainer 🐾</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#eef2f7;
}

.header {
  background:#1e1e2f;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container {
  display:flex;
  height:calc(100vh - 50px);
}

.panel {
  flex:1;
  padding:15px;
  overflow:auto;
}

.left {
  background:#1e1e2f;
  color:white;
}

.right {
  background:#fff;
  border-left:2px solid #ddd;
}

textarea {
  width:100%;
  height:250px;
  background:#111;
  color:#0f0;
  border:none;
  padding:10px;
  font-family:monospace;
}

button {
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}

#preview {
  border:1px solid #ccc;
  padding:10px;
  min-height:150px;
}

.progress {
  height:10px;
  background:#444;
}

.progress-bar {
  height:100%;
  width:0%;
  background:#4da3ff;
}

#hintBox {
  display:none;
  background:#dff6ff;
  color:#000;
  padding:10px;
  border-radius:8px;
}

.success {
  animation: pop 0.4s ease;
}

@keyframes pop {
  0% { transform:scale(1); }
  50% { transform:scale(1.1); }
  100% { transform:scale(1); }
}

pre {
  background:#111;
  color:#0f0;
  padding:10px;
  height:200px;
  overflow:auto;
}

body {
  font-size:18px;
}
</style>
</head>

<body>

<div class="header">
  <div>🐾 HTML Trainer</div>
  <div>
    XP: <span id="xp">0</span> |
    Streak: <span id="streak">0</span>
  </div>
</div>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div class="container">

  <div class="panel left">
    <h2 id="levelTitle"></h2>

    <p id="instruction"></p>

    <button onclick="toggleHint()">💡 Підказка</button>

    <div id="hintBox">
      <p id="hint"></p>
    </div>

    <p><b>Приклад:</b></p>
    <code id="example"></code>

    <textarea id="code"></textarea>

    <button onclick="check()">Перевірити</button>

    <p id="msg"></p>
  </div>

 <div class="panel right">
    <h3>👀 Preview</h3>
    <div id="preview"></div>

    <h3>🧾 Код</h3>
    <pre id="codeView"></pre>
  </div>

  <!-- ✅ НОВИЙ БЛОК ТУТ -->
  <div class="panel right">
    <h3>📜 Повна історія</h3>
    <pre id="fullHistory"></pre>

    <button onclick="restartGame()">🔄 Почати заново</button>
  </div>

</div>
<audio id="successSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="failSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>

<script>

// ===== STATE =====
let user = JSON.parse(localStorage.getItem("user")) || {
 xp:0,
 streak:0,
 currentLevel:0
};

// ===== PARSER =====
function parseHTML(code){
 let parser = new DOMParser();
 return parser.parseFromString(code,"text/html").body;
}

// ===== HISTORY CODE VIEW =====
function updateCodeView(){
 let allCode = "";

 for(let i = 0; i <= user.currentLevel; i++){
  let saved = localStorage.getItem("code_"+i);
  if(saved){
   allCode += `--- Рівень ${i+1} ---\n${saved}\n\n`;
  }
 }

 let current = document.getElementById("code").value;

 allCode += "--- Поточний ---\n" + current;

 document.getElementById("codeView").innerText = allCode;
}

// ===== TASKS (12 рівнів) =====
const tasks = [
{
 t:"🐱 Рівень 1",
 instruction:"Зроби великий заголовок 🐾",
 hint:"<h1>",
 example:"<h1>Кіт</h1>",
 check:(doc)=>({ok: doc.querySelector("h1"), errors:[]})
},
{
 t:"🐶 Рівень 2",
 instruction:"Напиши текст 🐾",
 hint:"<p>",
 example:"<p>Текст</p>",
 check:(doc)=>({ok: doc.querySelector("p"), errors:[]})
},
{
 t:"🐱 Рівень 3",
 instruction:"Жирний текст 🐾",
 hint:"<b>",
 example:"<b>Кіт</b>",
 check:(doc)=>({ok: doc.querySelector("b"), errors:[]})
},
{
 t:"🐶 Рівень 4",
 instruction:"Курсив 🐾",
 hint:"<i>",
 example:"<i>Кіт</i>",
 check:(doc)=>({ok: doc.querySelector("i"), errors:[]})
},
{
 t:"🐱 Рівень 5",
 instruction:"Посилання 🔗",
 hint:"<a href>",
 example:'<a href="#">link</a>',
 check:(doc)=>({ok: doc.querySelector("a"), errors:[]})
},
{
 t:"🐶 Рівень 6",
 instruction:"Картинка 🖼️",
 hint:"<img>",
 example:'<img src="...">',
 check:(doc)=>({ok: doc.querySelector("img"), errors:[]})
},
{
 t:"🐱 Рівень 7",
 instruction:"Список 📝",
 hint:"<ul><li>",
 example:`<ul><li>1</li></ul>`,
 check:(doc)=>({ok: doc.querySelector("ul") && doc.querySelector("li"), errors:[]})
},
{
 t:"🐶 Рівень 8",
 instruction:"Нумерований список 🔢",
 hint:"<ol>",
 example:`<ol><li>1</li></ol>`,
 check:(doc)=>({ok: doc.querySelector("ol") && doc.querySelector("li"), errors:[]})
},
{
 t:"🐱 Рівень 9",
 instruction:"Блок 🧱",
 hint:"<div>",
 example:"<div></div>",
 check:(doc)=>({ok: doc.querySelector("div"), errors:[]})
},
{
 t:"🐶 Рівень 10",
 instruction:"Кнопка 🔘",
 hint:"<button>",
 example:"<button>OK</button>",
 check:(doc)=>({ok: doc.querySelector("button"), errors:[]})
},
{
 t:"🐱 Рівень 11",
 instruction:"Форма 📝",
 hint:"<form>",
 example:"<form></form>",
 check:(doc)=>({ok: doc.querySelector("form"), errors:[]})
},
{
 t:"🏆 Рівень 12",
 instruction:"Фінал 🎉",
 hint:"<h1>",
 example:"<h1>Я молодець</h1>",
 check:(doc)=>({ok: doc.querySelector("h1"), errors:[]})
}
];

// ===== UI =====
function updateUI(){
 let progress = (user.currentLevel / tasks.length)*100;
 document.getElementById("progressBar").style.width = progress + "%";

 document.getElementById("xp").innerText = user.xp;
 document.getElementById("streak").innerText = user.streak;
}

// ===== LEVEL =====
function loadLevel(i){
 user.currentLevel = i;
 localStorage.setItem("user", JSON.stringify(user));

 let t = tasks[i];
 document.getElementById("levelTitle").innerText = t.t;
 document.getElementById("instruction").innerText = t.instruction;
 document.getElementById("hint").innerText = t.hint;
 document.getElementById("example").innerText = t.example;

 document.getElementById("code").value = localStorage.getItem("code_"+i) || "";

 updatePreview();
 updateUI();
}

// ===== PREVIEW =====
function updatePreview(){
 let code = document.getElementById("code").value;
 document.getElementById("preview").innerHTML = code;

 updateCodeView();
}

// ===== CHECK =====
function check(){
 let code = document.getElementById("code").value;
 let doc = parseHTML(code);
 let task = tasks[user.currentLevel];

 let result = task.check(doc);

 if(result.ok){
  document.getElementById("msg").innerText = "✅ Правильно!";
  document.getElementById("successSound").play();

  user.xp += 20;
  user.streak += 1;

  localStorage.setItem("code_"+user.currentLevel, code);
  updateCodeView();

  if(user.currentLevel < tasks.length-1){
   loadLevel(user.currentLevel+1);
  }

 } else {
  document.getElementById("msg").innerText = "❌ Спробуй ще";
  document.getElementById("failSound").play();
 }

 localStorage.setItem("user", JSON.stringify(user));
 updateUI();
}

// ===== HINT =====
function toggleHint(){
 let box = document.getElementById("hintBox");
 box.style.display = box.style.display === "none" ? "block" : "none";
}

// ===== EVENTS =====
document.getElementById("code").addEventListener("input", updatePreview);

// ===== INIT =====
loadLevel(user.currentLevel || 0);

</script>

</body>
</html>
