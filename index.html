<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Pet HTML Trainer 🐾</title>

<style>
body {
  font-family: Arial;
  background:#e9eef5;
  margin:0;
}

.container {
  display:flex;
  height:100vh;
}

.panel {
  flex:1;
  padding:15px;
  overflow:auto;
}

.left {
  background:#1e1e2f;
  color:white;
}

.right {
  background:#ffffff;
  border-left:2px solid #ddd;
}

textarea {
  width:100%;
  height:300px;
  background:#111;
  color:#0f0;
  border:none;
  padding:10px;
  font-family: monospace;
}

button {
  padding:10px;
  margin-top:10px;
  cursor:pointer;
}

#preview {
  border:1px solid #ccc;
  padding:10px;
  min-height:200px;
  margin-bottom:10px;
}

#hintBox {
  display:none;
  background:#333;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="panel left">
    <h2 id="levelTitle"></h2>

    <p><b>📌 Завдання:</b> <span id="instruction"></span></p>

    <button onclick="toggleHint()">💡 Підказка</button>

    <div id="hintBox">
      <p id="hint"></p>
    </div>

    <p><b>🧪 Приклад:</b> <code id="example"></code></p>

    <textarea id="code"></textarea>

    <button onclick="check()">Перевірити</button>

    <p id="msg"></p>
  </div>

  <div class="panel right">
    <h3>👀 Результат</h3>
    <div id="preview"></div>

    <h3>🧾 Код</h3>
    <pre id="codeView"></pre>
  </div>

</div>

<audio id="successSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="failSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>

<script>

// ===== PARSER =====
function parseHTML(code){
  let parser = new DOMParser();
  let doc = parser.parseFromString(code, "text/html");
  return doc.body;
}

// ===== TASKS =====
const tasks = [
{t:"🐾 Заголовок",instruction:"Створи заголовок",hint:"<h1>Текст</h1>",example:"<h1>Кіт</h1>",check:(doc)=>{
 let el = doc.querySelector("h1");
 return {
  ok: el && el.textContent.trim().length > 0,
  errors: [
   !el ? "❌ Немає <h1>" : null,
   el && el.textContent.trim()=="" ? "❌ Порожній заголовок" : null
  ].filter(Boolean)
 }
}},
{t:"🐾 Абзац",instruction:"Додай абзац",hint:"<p>",example:"<p>Текст</p>",check:(doc)=>{
 let el = doc.querySelector("p");
 return {ok: el && el.textContent.trim(), errors: !el?["❌ Немає <p>"]:[]}
}},
{t:"🐾 Жирний",instruction:"Жирний текст",hint:"<b>",example:"<b>Текст</b>",check:(doc)=>{
 let el = doc.querySelector("b");
 return {ok: el, errors: !el?["❌ Немає <b>"]:[]}
}},
{t:"🐾 Курсив",instruction:"Курсив",hint:"<i>",example:"<i>Текст</i>",check:(doc)=>{
 let el = doc.querySelector("i");
 return {ok: el, errors: !el?["❌ Немає <i>"]:[]}
}},
{t:"🐾 Посилання",instruction:"Посилання",hint:"<a href>",example:'<a href="#">Link</a>',check:(doc)=>{
 let el = doc.querySelector("a");
 return {ok: el && el.hasAttribute("href"), errors: !el?["❌ Немає <a>"]:[]}
}},
{t:"🐾 Зображення",instruction:"Фото",hint:"<img>",example:'<img src="cat.jpg">',check:(doc)=>{
 let el = doc.querySelector("img");
 return {ok: el, errors: !el?["❌ Немає <img>"]:[]}
}},
{t:"🐾 Список",instruction:"Список",hint:"<ul><li>",example:"<ul><li></li></ul>",check:(doc)=>{
 let el = doc.querySelector("ul");
 return {ok: el && el.querySelector("li"), errors: !el?["❌ Немає <ul>"]:[]}
}},
{t:"🐾 Нумерований список",instruction:"<ol>",hint:"",example:"<ol><li></li></ol>",check:(doc)=>{
 let el = doc.querySelector("ol");
 return {ok: el && el.querySelector("li"), errors: !el?["❌ Немає <ol>"]:[]}
}},
{t:"🐾 Контейнер",instruction:"<div>",hint:"",example:"<div></div>",check:(doc)=>{
 let el = doc.querySelector("div");
 return {ok: el, errors: !el?["❌ Немає <div>"]:[]}
}},
{t:"🐾 Кнопка",instruction:"<button>",hint:"",example:"<button>OK</button>",check:(doc)=>{
 let el = doc.querySelector("button");
 return {ok: el && el.textContent.trim(), errors: !el?["❌ Немає <button>"]:[]}
}},
{t:"🐾 Форма",instruction:"<form>",hint:"",example:"<form></form>",check:(doc)=>{
 let el = doc.querySelector("form");
 return {ok: el, errors: !el?["❌ Немає <form>"]:[]}
}}
];

// ===== LEVEL =====
let currentLevel = 0;

function loadLevel(i){
 currentLevel = i;
 let task = tasks[i];

 document.getElementById("levelTitle").innerText = task.t;
 document.getElementById("instruction").innerText = task.instruction;
 document.getElementById("hint").innerText = task.hint;
 document.getElementById("example").innerText = task.example;

 let saved = localStorage.getItem("code_"+i) || "";
 document.getElementById("code").value = saved;

 updatePreview();
}

// ===== PREVIEW =====
function updatePreview(){
 let code = document.getElementById("code").value;
 document.getElementById("codeView").innerText = code;
 document.getElementById("preview").innerHTML = code;
}

// ===== CHECK =====
function check(){
 let code = document.getElementById("code").value;
 let doc = parseHTML(code);
 let task = tasks[currentLevel];

 let result = task.check(doc);

 if(result.ok){
  document.getElementById("msg").innerText = "✅ Правильно!";
  document.getElementById("successSound").play();

  localStorage.setItem("code_"+currentLevel, code);

  if(currentLevel < tasks.length - 1){
   loadLevel(currentLevel + 1);
  }

 } else {
  document.getElementById("msg").innerText = result.errors.join(" | ");
  document.getElementById("failSound").play();
 }
}

// ===== HINT =====
function toggleHint(){
 let box = document.getElementById("hintBox");
 box.style.display = (box.style.display === "none") ? "block" : "none";
}

// ===== EVENTS =====
document.getElementById("code").addEventListener("input", updatePreview);

// ===== INIT =====
loadLevel(0);

</script>

</body>
</html>
