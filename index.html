<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Pet HTML Trainer 🐾</title>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #f4f6f9, #e9f0ff);
  margin:20px;
  color:#222;
}

.card {
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition:0.3s;
  animation: fadeIn 0.4s ease;
}

.card:hover {
  transform: translateY(-3px);
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

textarea {
  width:100%;
  height:160px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

#editorLayout {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

#editorLayout > div {
  flex:1;
  min-width:300px;
  background:#ffffff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

button {
  padding:10px 18px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#4da3ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  background:#2f8cff;
  transform:scale(1.05);
}

select {
  padding:8px;
  border-radius:8px;
  margin-bottom:10px;
}

#hintBox {
  display:none;
  background:#eef3ff;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  border-left:5px solid #4da3ff;
}

pre {
  background:#111;
  color:#0f0;
  padding:10px;
  border-radius:10px;
  overflow:auto;
}

#preview {
  padding:10px;
  border-radius:10px;
  background:#fafafa;
  min-height:100px;
  border:1px solid #ddd;
}

#msg {
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<h2 id="levelTitle"></h2>

<select onchange="setRole(this.value)">
  <option value="student">Дитина</option>
  <option value="admin">Адмін</option>
</select>

<p><b>📌 Завдання:</b> <span id="instruction"></span></p>

<button onclick="toggleHint()">💡 Показати підказку</button>

<div id="hintBox">
<p><b>💡 Підказка:</b> <span id="hint"></span></p>
</div>

<p><b>🧪 Приклад:</b> <code id="example"></code></p>

<textarea id="code"></textarea>

<br>
<button onclick="check()">Перевірити</button>
<button onclick="showAchievements()">🏆 Досягнення</button>

<p id="msg"></p>

<div id="editorLayout">
<div>
<h3>🧾 Код</h3>
<pre id="codeView"></pre>
</div>

<div>
<h3>👀 Результат</h3>
<div id="preview"></div>
</div>
</div>

</div>

<!-- SOUNDS -->
<audio id="successSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="failSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>

<script>

// ===== TASKS =====
const tasks = [
{t:"🐾 Заголовок",instruction:"Створи заголовок",hint:"<h1>",example:"<h1>Кіт</h1>",v:(c)=>/<h1>[\s\S]*<\/h1>/.test(c)},
{t:"🐾 Абзац",instruction:"Додай текст",hint:"<p>",example:"<p>Текст</p>",v:(c)=>c.includes("<p>")},
{t:"🐾 Жирний",instruction:"Жирний текст",hint:"<b>",example:"<b>Текст</b>",v:(c)=>c.includes("<b>")},
{t:"🐾 Курсив",instruction:"Курсив",hint:"<i>",example:"<i>Текст</i>",v:(c)=>c.includes("<i>")},
{t:"🐾 Посилання",instruction:"Посилання",hint:"<a>",example:'<a href="#">Link</a>',v:(c)=>c.includes("<a")},
{t:"🐾 Зображення",instruction:"Фото",hint:"<img>",example:'<img src="cat.jpg">',v:(c)=>c.includes("<img")},
{t:"🐾 Список",instruction:"Список",hint:"<ul>",example:"<ul><li></li></ul>",v:(c)=>c.includes("<ul")},
{t:"🐾 Нумерований список",instruction:"Нумерований",hint:"<ol>",example:"<ol><li></li></ol>",v:(c)=>c.includes("<ol")},
{t:"🐾 Контейнер",instruction:"Блок",hint:"<div>",example:"<div></div>",v:(c)=>c.includes("<div")},
{t:"🐾 Кнопка",instruction:"Кнопка",hint:"<button>",example:"<button>OK</button>",v:(c)=>c.includes("<button")},
{t:"🐾 Форма",instruction:"Форма",hint:"<form>",example:"<form></form>",v:(c)=>c.includes("<form")}
];

// ===== USER =====
let user = JSON.parse(localStorage.getItem("user")) || {
 xp:0,
 level:1,
 currentLevel:0,
 role:"student"
};

let achievements = JSON.parse(localStorage.getItem("achievements")) || [];

function saveUser(){
 localStorage.setItem("user", JSON.stringify(user));
 localStorage.setItem("achievements", JSON.stringify(achievements));
}

// ===== ROLE =====
function setRole(r){
 user.role = r;
 saveUser();
}

// ===== ACHIEVEMENTS =====
function unlock(name){
 if(!achievements.includes(name)){
  achievements.push(name);
  saveUser();
  alert("🏆 " + name);
 }
}

function showAchievements(){
 alert("🏆:\n" + achievements.join("\n"));
}

// ===== LEVEL =====
let currentLevel = 0;

function loadLevel(i){
 currentLevel = i;
 user.currentLevel = i;
 saveUser();

 let task = tasks[i];

 document.getElementById("levelTitle").innerText = task.t;
 document.getElementById("instruction").innerText = task.instruction;
 document.getElementById("hint").innerText = task.hint;
 document.getElementById("example").innerText = task.example;

 let saved = localStorage.getItem("code_"+i) || "";
 document.getElementById("code").value = saved;

 updatePreview();
}

// ===== PREVIEW =====
function updatePreview(){
 let code = document.getElementById("code").value;
 document.getElementById("codeView").innerText = code;
 document.getElementById("preview").innerHTML = code;
}

// ===== CHECK =====
function check(){
 let code = document.getElementById("code").value;
 let task = tasks[currentLevel];

 if(task.v(code)){
  document.getElementById("msg").innerText = "✅ Правильно!";
  document.getElementById("successSound").play();

  user.xp += 20;

  if(user.xp >= 100){
   user.level++;
   user.xp = 0;
   unlock("Новий рівень");
  }

  saveUser();

  localStorage.setItem("code_"+currentLevel, code);

  unlock("Рівень " + (currentLevel+1));

  if(currentLevel < tasks.length - 1){
   loadLevel(currentLevel + 1);
  }

 } else {
  document.getElementById("msg").innerText = "❌ Спробуй ще";
  document.getElementById("failSound").play();
 }
}

// ===== HINT =====
function toggleHint(){
 let box = document.getElementById("hintBox");
 box.style.display = (box.style.display === "none") ? "block" : "none";
}

// ===== EVENTS =====
document.getElementById("code").addEventListener("input", updatePreview);

// ===== INIT =====
loadLevel(user.currentLevel || 0);

</script>

</body>
</html>
