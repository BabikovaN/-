<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Гра</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#74b9ff,#a29bfe);
  text-align:center;
}

h1{color:white}

.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.card{
  background:white;
  padding:20px;
  margin:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

textarea{
  width:95%;
  max-width:500px;
  padding:10px;
  margin:10px 0;
  font-size:16px;
  font-family: monospace;
}

button{
  padding:12px 20px;
  margin-top:10px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#4da3ff;
  color:white;
}

.error{color:red;font-weight:bold;}
.success{color:green;font-weight:bold;}

.example{
  background:#2d3436;
  color:#00ffcc;
  padding:12px;
  border-radius:10px;
  font-family: monospace;
  text-align:left;
}

/* рамки */
.preview-box{
  margin-top:10px;
  padding:15px;
  border-radius:10px;
  border:2px solid #ccc;
}

.correct{
  border:3px solid green;
}

.wrong{
  border:3px solid red;
}

/* прогрес бар */
.progress-bar{
  width:100%;
  background:#ddd;
  border-radius:10px;
  margin:10px 0;
}

.progress{
  height:15px;
  width:0%;
  background:#4da3ff;
  border-radius:10px;
}

.compare{
  margin-top:10px;
  text-align:left;
  font-family: monospace;
  background:#f1f2f6;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🎮 HTML Гра</h1>

<div class="container">
  <div class="card">

    <div class="progress-bar">
      <div id="progress" class="progress"></div>
    </div>

    <div id="task"></div>

    <textarea id="code" placeholder="Впиши код..."></textarea>

    <br>
    <button onclick="check()">Перевірити</button>

    <p id="msg"></p>

    <div id="preview" class="preview-box"></div>

    <div id="compare"></div>

  </div>
</div>

<script>

let level = 0;

const tasks = [
{
  text: "Зроби заголовок",
  example: "<h1>Мій кіт</h1>",
  validate: (code) => code.includes("<h1>") && code.includes("</h1>")
},
{
  text: "Зроби абзац",
  example: "<p>Привіт</p>",
  validate: (code) => code.includes("<p>") && code.includes("</p>")
},
{
  text: "Додай картинку",
  example: '<img src="https://placekitten.com/200/200">',
  validate: (code) => code.includes("<img") && code.includes("src=")
}
];

function loadTask(){

  if(level >= tasks.length){
    document.getElementById("task").innerHTML = "🎉 Всі рівні пройдено!";
    return;
  }

  let t = tasks[level];

  document.getElementById("task").innerHTML = `
    <h2>${t.text}</h2>
    <p>Приклад:</p>
    <div class="example"><pre>${escapeHtml(t.example)}</pre></div>
  `;

  let saved = localStorage.getItem("level_" + level);
  document.getElementById("code").value = saved ? saved : "";

  updateProgress();
}

document.getElementById("code").addEventListener("input", function(){
  localStorage.setItem("level_" + level, this.value);
});

function check(){
  let code = document.getElementById("code").value.trim();
  let t = tasks[level];

  let preview = document.getElementById("preview");
  let msg = document.getElementById("msg");
  let compare = document.getElementById("compare");

  preview.classList.remove("correct","wrong");

  if(!code){
    showError("❌ Введи код");
    preview.classList.add("wrong");
    return;
  }

  if(!t.validate(code)){
    showError("❌ Невірно");
    preview.classList.add("wrong");
    showCompare(code, t.example);
    return;
  }

  showSuccess("✅ Правильно!");
  preview.classList.add("correct");
  preview.innerHTML = code;

  compare.innerHTML = "";

  localStorage.setItem("completed_" + level, "true");

  level++;
  setTimeout(loadTask, 1200);
}

function showError(msg){
  document.getElementById("msg").innerHTML = `<span class="error">${msg}</span>`;
}

function showSuccess(msg){
  document.getElementById("msg").innerHTML = `<span class="success">${msg}</span>`;
}

function showCompare(userCode, correctCode){
  document.getElementById("compare").innerHTML = `
    <div class="compare">
      <b>❌ Твій код:</b><br>${escapeHtml(userCode)}<br><br>
      <b>✅ Правильний приклад:</b><br>${escapeHtml(correctCode)}
    </div>
  `;
}

function updateProgress(){
  let percent = (level / tasks.length) * 100;
  document.getElementById("progress").style.width = percent + "%";
}

function escapeHtml(text){
  return text
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

loadTask();

</script>

</body>
</html>
