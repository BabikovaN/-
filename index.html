<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Малий веб-розробник</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #74b9ff, #a29bfe);
  text-align: center;
  margin: 0;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 20px;
  margin-top: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

textarea {
  width: 100%;
  height: 150px;
  font-family: monospace;
  padding: 10px;
  border-radius: 10px;
}

button {
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #4da3ff;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#error {
  color: red;
  margin-top: 10px;
  font-weight: bold;
}

#output {
  margin-top: 15px;
  background: white;
  padding: 10px;
  border-radius: 10px;
}

#codeView {
  text-align: left;
  background: #2d3436;
  color: #00ffcc;
  padding: 10px;
  border-radius: 10px;
  white-space: pre-wrap;
}
</style>

</head>
<body>

<div class="container">

<h1>🎮 Малий веб-розробник</h1>

<div class="card">
  <h2>✍️ Пиши HTML код</h2>
  <textarea id="editor">
<h1>Мій кіт</h1>
<p>Любить молоко</p>
  </textarea>

  <button onclick="runCode()">▶ Запустити</button>

  <div id="error"></div>
</div>

<div class="card">
  <h2>💻 Код</h2>
  <pre id="codeView"></pre>
</div>

<div class="card">
  <h2>📦 Результат</h2>
  <div id="output"></div>
</div>

</div>

<script>
let editor = document.getElementById("editor");
let output = document.getElementById("output");
let codeView = document.getElementById("codeView");
let errorBox = document.getElementById("error");

function runCode(){
  let code = editor.value;

  let check = checkHTML(code);

  if(check !== "ok"){
    errorBox.innerText = check;
    output.innerHTML = "";
    codeView.textContent = code;
    return;
  }

  errorBox.innerText = "";
  output.innerHTML = code;
  codeView.textContent = code;
}

// 🔍 проста перевірка HTML тегів
function checkHTML(code){
  let stack = [];
  let tags = code.match(/<\/?[^>]+>/g);

  if(!tags) return "❌ Немає тегів";

  for(let tag of tags){
    if(tag.startsWith("</")){
      let name = tag.replace("</","").replace(">","");
      if(stack.length === 0 || stack.pop() !== name){
        return "❌ Помилка: неправильне закриття тега " + tag;
      }
    } else if(!tag.endsWith("/>")){
      let name = tag.replace("<","").replace(">","");
      stack.push(name);
    }
  }

  if(stack.length > 0){
    return "❌ Тег не закритий: <" + stack.pop() + ">";
  }

  return "ok";
}

// старт
runCode();
</script>

</body>
</html>
