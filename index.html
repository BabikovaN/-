<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Навчальна HTML гра</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#74b9ff,#a29bfe);
  text-align:center;
}

h1{color:white}

.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.card{
  background:white;
  padding:20px;
  margin:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

textarea,input{
  width:95%;
  max-width:500px;
  padding:10px;
  margin:10px 0;
  font-size:16px;
}

button{
  padding:12px 20px;
  margin-top:10px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#4da3ff;
  color:white;
}

.error{color:red;font-weight:bold;}
.success{color:green;font-weight:bold;}

.example{
  background:#dfe6e9;
  padding:10px;
  border-radius:10px;
  font-family:monospace;
}
</style>
</head>

<body>

<h1>🎮 Навчайся HTML</h1>

<div class="container">
  <div class="card">
    <div id="task"></div>

    <textarea id="code" placeholder="Впиши свій код тут..."></textarea>

    <br>
    <button onclick="check()">Перевірити</button>

    <p id="msg"></p>

    <div id="preview"></div>
  </div>
</div>

<script>

let level = 0;

const tasks = [
{
  text: "Зроби заголовок",
  example: "<h1>Мій кіт</h1>",
  check: (code)=> code.includes("<h1>") && code.includes("</h1>")
},
{
  text: "Зроби абзац",
  example: "<p>Привіт</p>",
  check: (code)=> code.includes("<p>") && code.includes("</p>")
},
{
  text: "Додай картинку",
  example: '<img src="https://placekitten.com/200/200">',
  check: (code)=> code.includes("<img") && code.includes("src=")
},
{
  text: "Зроби список",
  example: "<ul><li>Кіт</li><li>Пес</li></ul>",
  check: (code)=> code.includes("<ul>") && code.includes("<li>")
}
];

function loadTask(){
  if(level >= tasks.length){
    document.getElementById("task").innerHTML = "🎉 Вітаємо! Ти пройшов всі рівні!";
    return;
  }

  let t = tasks[level];

  document.getElementById("task").innerHTML = `
    <h2>${t.text}</h2>
    <p>Приклад:</p>
    <div class="example">${t.example}</div>
  `;

  document.getElementById("code").value = "";
  document.getElementById("msg").innerHTML = "";
  document.getElementById("preview").innerHTML = "";
}

function check(){
  let code = document.getElementById("code").value;
  let t = tasks[level];

  // базова перевірка пустоти
  if(!code.trim()){
    document.getElementById("msg").innerHTML = "❌ Введи код";
    return;
  }

  // перевірка HTML балансу тегів
  if(!isValidHTML(code)){
    document.getElementById("msg").innerHTML = "❌ Помилка в тегах (перевір закриття)";
    return;
  }

  // логічна перевірка рівня
  if(!t.check(code)){
    document.getElementById("msg").innerHTML = "❌ Невірне завдання";
    return;
  }

  document.getElementById("msg").innerHTML = "✅ Правильно!";
  document.getElementById("preview").innerHTML = code;

  level++;
  setTimeout(loadTask, 1500);
}

/* 🔍 перевірка HTML тегів */
function isValidHTML(code){
  let stack = [];
  let tags = code.match(/<\/?[^>]+>/g);

  if(!tags) return true;

  for(let tag of tags){
    if(tag.startsWith("</")){
      let name = tag.replace("</","").replace(">","");
      if(stack.length === 0 || stack.pop() !== name){
        return false;
      }
    } else if(!tag.endsWith("/>")){
      let name = tag.replace("<","").replace(">","");
      stack.push(name);
    }
  }

  return stack.length === 0;
}

loadTask();

</script>

</body>
</html>
