<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>HTML Pet Trainer 🐾</title>

<style>
body {
  font-family: Arial;
  background:#f4f6f9;
  margin:20px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

textarea {
  width:100%;
  height:150px;
  margin-top:10px;
}

#editorLayout {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

#editorLayout > div {
  flex:1;
  min-width:300px;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

button {
  padding:10px 15px;
  margin-top:10px;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.05);
}

#hintBox {
  display:none;
  background:#eef;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <h2 id="levelTitle"></h2>

  <p><b>📌 Завдання:</b> <span id="instruction"></span></p>

  <button onclick="toggleHint()">💡 Показати підказку</button>

  <div id="hintBox">
    <p><b>💡 Підказка:</b> <span id="hint"></span></p>
  </div>

  <p><b>🧪 Приклад:</b> <code id="example"></code></p>

  <textarea id="code"></textarea>

  <button onclick="check()">Перевірити</button>

  <p id="msg"></p>

  <div id="editorLayout">
    <div>
      <h3>🧾 Код</h3>
      <pre id="codeView"></pre>
    </div>

    <div>
      <h3>👀 Результат</h3>
      <div id="preview"></div>
    </div>
  </div>
</div>

<script>

// ===== LEVELS =====
const tasks = [
{
t:"🐾 Рівень 1 — Заголовок",
instruction:"Створи заголовок про свою тваринку",
hint:"Використай <h1>",
example:"<h1>Мій кіт</h1>",
v:(c)=>/<h1>[\s\S]*<\/h1>/.test(c)
},
{
t:"🐾 Рівень 2 — Абзац",
instruction:"Додай опис тваринки",
hint:"Використай <p>",
example:"<p>Мій кіт милий</p>",
v:(c)=>c.includes("<p>")
},
{
t:"🐾 Рівень 3 — Жирний текст",
instruction:"Зроби частину тексту жирною",
hint:"Використай <b>",
example:"<b>Кіт</b>",
v:(c)=>c.includes("<b>")
},
{
t:"🐾 Рівень 4 — Курсив",
instruction:"Зроби текст курсивом",
hint:"Використай <i>",
example:"<i>Кіт</i>",
v:(c)=>c.includes("<i>")
},
{
t:"🐾 Рівень 5 — Посилання",
instruction:"Додай посилання",
hint:"Використай <a>",
example:'<a href="#">Тварина</a>',
v:(c)=>c.includes("<a")
},
{
t:"🐾 Рівень 6 — Зображення",
instruction:"Додай фото тваринки",
hint:"Використай <img>",
example:'<img src="cat.jpg">',
v:(c)=>c.includes("<img")
},
{
t:"🐾 Рівень 7 — Список",
instruction:"Створи список",
hint:"<ul> + <li>",
example:"<ul><li>Їжа</li></ul>",
v:(c)=>c.includes("<ul")
},
{
t:"🐾 Рівень 8 — Нумерований список",
instruction:"Створи список з цифрами",
hint:"<ol>",
example:"<ol><li>1</li></ol>",
v:(c)=>c.includes("<ol")
},
{
t:"🐾 Рівень 9 — Контейнер",
instruction:"Створи блок",
hint:"<div>",
example:"<div>Контент</div>",
v:(c)=>c.includes("<div")
},
{
t:"🐾 Рівень 10 — Кнопка",
instruction:"Додай кнопку",
hint:"<button>",
example:"<button>Натисни</button>",
v:(c)=>c.includes("<button")
},
{
t:"🐾 Рівень 11 — Форма",
instruction:"Створи форму",
hint:"<form>",
example:"<form></form>",
v:(c)=>c.includes("<form")
}
];

// ===== USER =====
let user = JSON.parse(localStorage.getItem("user")) || {
  xp:0,
  currentLevel:0
};

function saveUser(){
  localStorage.setItem("user", JSON.stringify(user));
}

// ===== LEVEL =====
let currentLevel = 0;

function loadLevel(i){
  currentLevel = i;
  user.currentLevel = i;
  saveUser();

  let task = tasks[i];

  document.getElementById("levelTitle").innerText = task.t;
  document.getElementById("instruction").innerText = task.instruction;
  document.getElementById("hint").innerText = task.hint;
  document.getElementById("example").innerText = task.example;

  let saved = localStorage.getItem("code_"+i) || "";
  document.getElementById("code").value = saved;

  updatePreview();
}

// ===== PREVIEW =====
function updatePreview(){
  let code = document.getElementById("code").value;
  document.getElementById("codeView").innerText = code;
  document.getElementById("preview").innerHTML = code;
}

// ===== CHECK =====
function check(){
  let code = document.getElementById("code").value;
  let task = tasks[currentLevel];

  if(task.v(code)){
    document.getElementById("msg").innerText = "✅ Правильно!";

    user.xp += 20;
    saveUser();

    localStorage.setItem("code_"+currentLevel, code);

    if(currentLevel < tasks.length - 1){
      loadLevel(currentLevel + 1);
    }

  } else {
    document.getElementById("msg").innerText = "❌ Спробуй ще";
  }
}

// ===== HINT =====
function toggleHint(){
  let box = document.getElementById("hintBox");
  box.style.display = (box.style.display === "none") ? "block" : "none";
}

// ===== EVENTS =====
document.getElementById("code").addEventListener("input", updatePreview);

// ===== INIT =====
loadLevel(user.currentLevel || 0);

</script>

</body>
</html>
