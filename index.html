<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Навчання PRO+</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#74b9ff,#a29bfe);
  text-align:center;
}

h1{color:white}

.container{max-width:900px;margin:auto;padding:10px;}

.card{
  background:white;
  padding:20px;
  margin:15px;
  border-radius:15px;
}

textarea{
  width:95%;
  max-width:600px;
  padding:10px;
  font-family: monospace;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#4da3ff;
  color:white;
}

.correct{border:3px solid green;}
.wrong{border:3px solid red;}

.hidden{display:none;}

.info-box{
  background:#ffffff;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  text-align:left;
  line-height:1.5;
  color:#000;
  border:1px solid #ddd;
}

/* 🔥 ДОДАНО ВІДОБРАЖЕННЯ */
#instruction{
  font-size:18px;
  font-weight:bold;
}

#hint{
  color:#0984e3;
}

#example{
  background:#2d3436;
  color:#00ffcc;
  padding:10px;
  border-radius:8px;
  display:block;
  margin-top:5px;
  overflow:auto;
}

#explanation{
  background:#ffeaa7;
  border-left:6px solid #e17055;
  font-weight:bold;
}

#codeView{
  background:#2d3436;
  color:#00ffcc;
  padding:10px;
  border-radius:10px;
  min-height:150px;
  text-align:left;
  overflow:auto;
}

#preview{
  background:#fff;
  padding:15px;
  border-radius:10px;
  min-height:150px;
  border:2px solid #ccc;
  text-align:left;
  color:#000;
}

#preview *{
  color:#000;
}
</style>
</head>

<body>

<h1>🎮 HTML Навчання PRO+</h1>

<div class="container">

<div class="card">
  <button onclick="showTab('game')">🎯 Гра</button>
  <button onclick="showTab('profile')">👤 Профіль</button>
</div>

<div id="game" class="card">

  <h2 id="lessonTitle"></h2>

  <div class="info-box">
    <b>📌 Завдання:</b>
    <div id="instruction"></div>
  </div>

  <div class="info-box">
    <b>💡 Підказка:</b>
    <div id="hint"></div>
  </div>

  <div id="explanation" class="info-box"></div>

  <div class="info-box">
    <b>🧪 Приклад:</b>
    <pre id="example"></pre>
  </div>

  <textarea id="code"></textarea>

  <br>
  <button onclick="check()">Перевірити</button>

  <p id="msg"></p>

  <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">

    <div style="flex:1; min-width:300px;">
      <h3>🧾 Код</h3>
      <pre id="codeView"></pre>
    </div>

    <div style="flex:1; min-width:300px;">
      <h3>👀 Результат</h3>
      <div id="preview"></div>
    </div>

  </div>

</div>

<div id="profile" class="card hidden">
  XP: <span id="xp"></span><br>
  Рівень: <span id="levelUser"></span>
</div>

</div>

<script>

let user = JSON.parse(localStorage.getItem("user")) || {
  xp:0,
  level:1
};

let savedCode = JSON.parse(localStorage.getItem("savedCode")) || {};

let currentLevel = 0;

function escapeHTML(str){
  return str.replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ✅ гарантія що текст не пустий
function safeText(v){
  return v && v.trim() !== "" ? v : "—";
}

const tasks = [
{
t:"Заголовок",
instruction:"Напиши HTML заголовок сторінки",
hint:"Використай тег h1",
exp:"<h1> створює головний заголовок",
example:"<h1>Мій сайт</h1>",
v:(c)=>c.includes("<h1>")
},
{
t:"Абзац",
instruction:"Створи абзац",
hint:"Використай тег p",
exp:"Абзац тексту",
example:"<p>Привіт</p>",
v:(c)=>c.includes("<p>")
},
{
t:"Жирний текст",
instruction:"Зроби текст жирним",
hint:"Використай тег b",
exp:"Bold текст",
example:"<b>Текст</b>",
v:(c)=>c.includes("<b>")
},
{
t:"Курсив",
instruction:"Курсив",
hint:"Використай тег i",
exp:"Italic текст",
example:"<i>Текст</i>",
v:(c)=>c.includes("<i>")
},
{
t:"Посилання",
instruction:"Створи посилання",
hint:"Використай тег a",
exp:"Link",
example:'<a href="#">Сайт</a>',
v:(c)=>c.includes("<a")
},
{
t:"Зображення",
instruction:"Додай картинку",
hint:"Використай тег img",
exp:"Image",
example:'<img src="img.jpg">',
v:(c)=>c.includes("<img")
},
{
t:"Список",
instruction:"Створи список",
hint:"Використай ul",
exp:"List",
example:"<ul><li>1</li></ul>",
v:(c)=>c.includes("<ul")
},
{
t:"Нумерований список",
instruction:"Нумерований список",
hint:"Використай ol",
exp:"Ordered list",
example:"<ol><li>1</li></ol>",
v:(c)=>c.includes("<ol")
},
{
t:"Контейнер",
instruction:"Блок",
hint:"Використай div",
exp:"Container",
example:"<div>Текст</div>",
v:(c)=>c.includes("<div")
},
{
t:"Кнопка",
instruction:"Кнопка",
hint:"Використай button",
exp:"Button",
example:"<button>OK</button>",
v:(c)=>c.includes("<button")
},
{
t:"Форма",
instruction:"Форма",
hint:"Використай form",
exp:"Form",
example:"<form></form>",
v:(c)=>c.includes("<form")
}
];

function showTab(tab){
  document.getElementById("game").classList.remove("hidden");
  document.getElementById("profile").classList.add("hidden");
}

function loadLevel(i){
  currentLevel = i;

  let t = tasks[i];

  document.getElementById("lessonTitle").innerText = safeText(t.t);
  document.getElementById("instruction").innerText = "📌 " + safeText(t.instruction);
  document.getElementById("hint").innerText = "💡 " + safeText(t.hint);
  document.getElementById("explanation").innerText = safeText(t.exp);
  document.getElementById("example").textContent = safeText(t.example);

  document.getElementById("code").value = savedCode[i] || "";
}

function check(){

  let code = document.getElementById("code").value;
  let t = tasks[currentLevel];
  let preview = document.getElementById("preview");

  if(!t.v(code)){
    document.getElementById("msg").innerText="❌ Помилка";
    preview.classList.add("wrong");
    return;
  }

  document.getElementById("msg").innerText="✅ Правильно!";
  preview.classList.remove("wrong");
  preview.classList.add("correct");

  document.getElementById("codeView").innerHTML = escapeHTML(code);
  preview.innerHTML = code;

  savedCode[currentLevel] = code;
  localStorage.setItem("savedCode", JSON.stringify(savedCode));

  user.xp += 20;

  if(currentLevel < tasks.length - 1){
    setTimeout(()=>loadLevel(currentLevel + 1), 800);
  }
}

loadLevel(0);

</script>

</body>
</html>
