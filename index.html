<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Навчальна HTML гра</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#74b9ff,#a29bfe);
  text-align:center;
}

h1{color:white}

.container{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.card{
  background:white;
  padding:20px;
  margin:15px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

textarea{
  width:95%;
  max-width:500px;
  padding:10px;
  margin:10px 0;
  font-size:16px;
  font-family: monospace;
}

button{
  padding:12px 20px;
  margin-top:10px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#4da3ff;
  color:white;
}

.error{color:red;font-weight:bold;}
.success{color:green;font-weight:bold;}

.example{
  background:#2d3436;
  color:#00ffcc;
  padding:12px;
  border-radius:10px;
  font-family: monospace;
  text-align:left;
  overflow-x:auto;
}

.task-title{
  font-size:20px;
  font-weight:bold;
}

</style>
</head>

<body>

<h1>🎮 Навчайся HTML</h1>

<div class="container">
  <div class="card">
    
    <div id="task"></div>

    <textarea id="code" placeholder="Впиши свій код тут..."></textarea>

    <br>
    <button onclick="check()">Перевірити</button>

    <p id="msg"></p>

    <div id="preview"></div>
  </div>
</div>

<script>

let level = 0;

const tasks = [
{
  text: "Створи заголовок",
  example: "<h1>Мій кіт</h1>",
  validate: (code) => {
    if(!code.includes("<h1>")) return "❌ Немає <h1>";
    if(!code.includes("</h1>")) return "❌ Немає </h1>";
    return "ok";
  }
},
{
  text: "Створи абзац",
  example: "<p>Привіт</p>",
  validate: (code) => {
    if(!code.includes("<p>")) return "❌ Немає <p>";
    if(!code.includes("</p>")) return "❌ Немає </p>";
    return "ok";
  }
},
{
  text: "Додай картинку",
  example: '<img src="https://placekitten.com/200/200">',
  validate: (code) => {
    if(!code.includes("<img")) return "❌ Немає <img>";
    if(!code.includes("src=")) return "❌ Немає src";
    return "ok";
  }
}
];

function loadTask(){
  if(level >= tasks.length){
    document.getElementById("task").innerHTML = "🎉 Всі рівні пройдено!";
    localStorage.removeItem("savedCode");
    return;
  }

  let t = tasks[level];

  document.getElementById("task").innerHTML = `
    <div class="task-title">${t.text}</div>

    <p>📌 Приклад правильного коду:</p>
    <div class="example">
<pre>${escapeHtml(t.example)}</pre>
    </div>
  `;

  // 🔥 відновлення збереженого коду
  let saved = localStorage.getItem("savedCode");
  document.getElementById("code").value = saved ? saved : "";

  document.getElementById("msg").innerHTML = "";
  document.getElementById("preview").innerHTML = "";
}

// 🔥 збереження при вводі
document.getElementById("code").addEventListener("input", function(){
  localStorage.setItem("savedCode", this.value);
});

function check(){
  let code = document.getElementById("code").value.trim();
  let t = tasks[level];

  if(!code){
    showError("❌ Введи код");
    return;
  }

  if(!isValidHTML(code)){
    showError("❌ Помилка в тегах (перевір закриття)");
    return;
  }

  let result = t.validate(code);

  if(result !== "ok"){
    showError(result);
    return;
  }

  showSuccess("✅ Правильно!");
  document.getElementById("preview").innerHTML = code;

  level++;
  localStorage.removeItem("savedCode");

  setTimeout(loadTask, 1500);
}

function showError(msg){
  document.getElementById("msg").innerHTML = `<span class="error">${msg}</span>`;
}

function showSuccess(msg){
  document.getElementById("msg").innerHTML = `<span class="success">${msg}</span>`;
}

// перевірка HTML
function isValidHTML(code){
  let stack = [];
  let tags = code.match(/<\/??[^>]+>/g);

  if(!tags) return true;

  for(let tag of tags){
    if(tag.startsWith("</")){
      let name = tag.replace("</","").replace(">","");
      if(stack.length === 0 || stack.pop() !== name){
        return false;
      }
    } else if(!tag.endsWith("/>") && !tag.includes("img")){
      let name = tag.replace("<","").replace(">","");
      stack.push(name);
    }
  }

  return stack.length === 0;
}

// escape HTML для прикладу
function escapeHtml(text){
  return text
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

loadTask();

</script>

</body>
</html>
